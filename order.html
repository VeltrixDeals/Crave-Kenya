<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<title>Order Now</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body bgcolor="#FDFDFD" text="#222222">

<section>
<center>
    <br><br><br>
    <h1>
        <font face="Playfair Display" size="7" color="#111111">Place Your Order</font>
    </h1>
    
    <br>

    <table border="0" cellpadding="40" cellspacing="0" bgcolor="#F9F9F9" width="550" style="border: 1px solid #E0E0E0; max-width:100%;">
        <tr>
            <td>
                <form id="orderForm">
                    
                    <input type="text" id="customer_name" placeholder="Full Name" required style="width:100%; padding:10px; font-family:'Poppins',sans-serif; border:1px solid #CCCCCC; box-sizing:border-box;">
                    
                    <br><br>
                    
                    <input type="tel" id="phone" placeholder="Phone Number" required style="width:100%; padding:10px; font-family:'Poppins',sans-serif; border:1px solid #CCCCCC; box-sizing:border-box;">
                    
                    <br><br>
                    
                    <select id="item" style="width:100%; padding:10px; font-family:'Poppins',sans-serif; border:1px solid #CCCCCC; box-sizing:border-box; background-color:#FFFFFF;">
                        <option>Breakfast</option>
                        <option>Burger</option>
                        <option>Pizza</option>
                        <option>Pasta</option>
                        <option>Dessert</option>
                        <option>Drinks</option>
                    </select>
                    
                    <br><br>
                    
                    <input type="number" id="quantity" placeholder="Quantity" required style="width:100%; padding:10px; font-family:'Poppins',sans-serif; border:1px solid #CCCCCC; box-sizing:border-box;">
                    
                    <br><br>
                    
                    <input type="text" id="mpesa_code" placeholder="M-Pesa Transaction Code" style="width:100%; padding:10px; font-family:'Poppins',sans-serif; border:1px solid #CCCCCC; box-sizing:border-box;">
                    
                    <br><br><br>
                    
                    <center>
                        <button type="submit" style="background-color:#111111; color:#FFFFFF; border:none; padding:12px 35px; font-family:'Poppins',sans-serif; font-size:12px; letter-spacing:2px; cursor:pointer; width:100%;">
                            <strong>Submit Order</strong>
                        </button>
                    </center>

                </form>
            </td>
        </tr>
    </table>

    <br><br>
    <p id="message"></p>

</center>
</section>

<script>
const supabaseUrl = "https://hleopwmajetpaixqwidg.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsZW9wd21hamV0cGFpeHF3aWRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzEyMTAsImV4cCI6MjA5NzgwNzIxMH0.4e2OddUKXfHOJ0CV2nBps84NNmKqaC5ZKUL9o2abg7A";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

document.getElementById("orderForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const customer_name = document.getElementById("customer_name").value;
    const phone = document.getElementById("phone").value;
    const item = document.getElementById("item").value;
    const quantity = document.getElementById("quantity").value;
    const mpesa_code = document.getElementById("mpesa_code").value;

    const { error } = await supabase
        .from("orders")
        .insert([{
            customer_name,
            phone,
            item,
            quantity,
            mpesa_code
        }]);

    const message = document.getElementById("message");

    if(error){
        message.innerText = "Error saving order.";
        console.error(error);
    } else {
        message.innerText = "Order submitted successfully!";
        document.getElementById("orderForm").reset();
    }
});
</script>
  
</body>
</html>
