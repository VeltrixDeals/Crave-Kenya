<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<title>Reservations</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<section style="padding-top:150px">

<h1 class="section-title">
Reserve A Table
</h1>
<form id="reservationForm" class="feature-card" style="max-width:700px;margin:auto;">

<input type="text" id="customer_name" placeholder="Full Name" required>

<br><br>

<input type="tel" id="phone" placeholder="Phone Number" required>

<br><br>

<input type="date" id="reservation_date" required>

<br><br>

<input type="time" id="reservation_time" required>

<br><br>

<input type="number" id="guests" placeholder="Number of Guests" required>

<br><br>

<button type="submit" class="btn btn-primary">
Reserve Table
</button>

</form>

<p id="message"></p>

</section>

  <script>

const supabaseUrl =
"https://hleopwmajetpaixqwidg.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhsZW9wd21hamV0cGFpeHF3aWRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzEyMTAsImV4cCI6MjA5NzgwNzIxMH0.4e2OddUKXfHOJ0CV2nBps84NNmKqaC5ZKUL9o2abg7A";

const { createClient } = supabase;

const client =
createClient(supabaseUrl, supabaseKey);

document
.getElementById("reservationForm")
.addEventListener("submit", async (e)=>{

e.preventDefault();

const customer_name =
document.getElementById("customer_name").value;

const phone =
document.getElementById("phone").value;

const reservation_date =
document.getElementById("reservation_date").value;

const reservation_time =
document.getElementById("reservation_time").value;

const guests =
document.getElementById("guests").value;

const { error } = await client
.from("reservations")
.insert([{
customer_name,
phone,
reservation_date,
reservation_time,
guests
}]);

const message =
document.getElementById("message");

if(error){
message.innerText = error.message;
console.error(error);
}else{
message.innerText =
"Reservation submitted successfully!";
document.getElementById("reservationForm").reset();
}

});

  </script>
  
</body>
</html>
